---
name: upstream-sync-candidate

on:
  schedule:
    # Weekly candidate sync, after the Monday drift monitor.
    - cron: "23 5 * * 1"
  workflow_dispatch:
    inputs:
      upstream_repository:
        description: "Repository to sync from"
        required: false
        default: "NVlabs/cuda-oxide"
        type: string
      upstream_branch:
        description: "Branch to sync from"
        required: false
        default: "main"
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  candidate:
    name: Create upstream sync candidate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Clone repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git identity
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Merge upstream into candidate branch
        id: sync
        shell: bash
        env:
          INPUT_UPSTREAM_REPOSITORY: ${{ inputs.upstream_repository || 'NVlabs/cuda-oxide' }}
          INPUT_UPSTREAM_BRANCH: ${{ inputs.upstream_branch || 'main' }}
        run: |
          set -euo pipefail

          upstream_repository="${INPUT_UPSTREAM_REPOSITORY}"
          upstream_branch="${INPUT_UPSTREAM_BRANCH}"

          git remote remove upstream-sync >/dev/null 2>&1 || true
          git remote add upstream-sync "https://github.com/${upstream_repository}.git"
          git fetch --tags upstream-sync "+refs/heads/${upstream_branch}:refs/remotes/upstream-sync/${upstream_branch}"

          upstream_ref="refs/remotes/upstream-sync/${upstream_branch}"
          base_head="$(git rev-parse HEAD)"
          upstream_head="$(git rev-parse "${upstream_ref}")"
          behind_count="$(git rev-list --count "HEAD..${upstream_ref}")"
          upstream_short="$(git rev-parse --short=12 "${upstream_ref}")"
          base_short="$(git rev-parse --short=12 HEAD)"
          candidate_branch="custom/upstream-sync-${upstream_short}-${base_short}"
          remote_candidate_ref="refs/remotes/origin/${candidate_branch}"

          {
            echo "upstream_repository=${upstream_repository}"
            echo "upstream_branch=${upstream_branch}"
            echo "base_head=${base_head}"
            echo "upstream_head=${upstream_head}"
            echo "behind_count=${behind_count}"
            echo "candidate_branch=${candidate_branch}"
            echo "has_changes=false"
            echo "merge_conflict=false"
          } >> "${GITHUB_OUTPUT}"

          if [ "${behind_count}" = "0" ]; then
            echo "No upstream changes to merge."
            exit 0
          fi

          if git ls-remote --exit-code --heads origin "${candidate_branch}" >/dev/null 2>&1; then
            git fetch origin "+refs/heads/${candidate_branch}:${remote_candidate_ref}"
            existing_head="$(git rev-parse "${remote_candidate_ref}")"
            {
              echo "has_changes=true"
              echo "new_head=${existing_head}"
            } >> "${GITHUB_OUTPUT}"
            echo "Candidate branch already exists at ${existing_head}; reusing it."
            exit 0
          fi

          git switch -c "${candidate_branch}"

          set +e
          git merge --no-ff --no-edit "${upstream_ref}"
          merge_status=$?
          set -e

          if [ "${merge_status}" -ne 0 ]; then
            git merge --abort || true
            {
              echo "has_changes=true"
              echo "merge_conflict=true"
            } >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          new_head="$(git rev-parse HEAD)"
          git push origin "${candidate_branch}"

          {
            echo "has_changes=true"
            echo "new_head=${new_head}"
          } >> "${GITHUB_OUTPUT}"

      - name: Write sync summary
        shell: bash
        run: |
          {
            echo "## Upstream sync candidate"
            echo
            echo "- Upstream: ${{ steps.sync.outputs.upstream_repository }}/${{ steps.sync.outputs.upstream_branch }}"
            echo "- Base HEAD: \`${{ steps.sync.outputs.base_head }}\`"
            echo "- Upstream HEAD: \`${{ steps.sync.outputs.upstream_head }}\`"
            echo "- Behind count: ${{ steps.sync.outputs.behind_count }}"
            echo "- Candidate branch: \`${{ steps.sync.outputs.candidate_branch || 'none' }}\`"
            echo "- Merge conflict: ${{ steps.sync.outputs.merge_conflict }}"
            echo "- Candidate HEAD: \`${{ steps.sync.outputs.new_head || 'none' }}\`"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Create or update candidate PR
        if: steps.sync.outputs.has_changes == 'true' && steps.sync.outputs.merge_conflict != 'true'
        uses: actions/github-script@v7
        env:
          UPSTREAM_REPOSITORY: ${{ steps.sync.outputs.upstream_repository }}
          UPSTREAM_BRANCH: ${{ steps.sync.outputs.upstream_branch }}
          BASE_HEAD: ${{ steps.sync.outputs.base_head }}
          UPSTREAM_HEAD: ${{ steps.sync.outputs.upstream_head }}
          CANDIDATE_BRANCH: ${{ steps.sync.outputs.candidate_branch }}
          CANDIDATE_HEAD: ${{ steps.sync.outputs.new_head }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const branch = process.env.CANDIDATE_BRANCH;
            const marker = '<!-- cuda-oxide-upstream-sync-candidate -->';
            const title = `Sync upstream ${process.env.UPSTREAM_REPOSITORY}/${process.env.UPSTREAM_BRANCH} ${process.env.UPSTREAM_HEAD.slice(0, 7)}`;
            const body = [
              marker,
              '## Upstream sync candidate',
              '',
              `- Upstream: ${process.env.UPSTREAM_REPOSITORY}/${process.env.UPSTREAM_BRANCH}`,
              `- Base HEAD: \`${process.env.BASE_HEAD}\``,
              `- Upstream HEAD: \`${process.env.UPSTREAM_HEAD}\``,
              `- Candidate HEAD: \`${process.env.CANDIDATE_HEAD}\``,
              '',
              'This PR is a review surface for the upstream merge. It does not publish releases, move tags, or change project versions.',
              '',
              'After CI is green, merge this PR or reproduce the same merge locally with:',
              '',
              '```powershell',
              '.\\scripts\\sync-upstream.ps1 -RunChecks -Push',
              '```',
            ].join('\n');

            const { data: prs } = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head: `${owner}:${branch}`,
              base: 'main',
              per_page: 10,
            });

            if (prs.length > 0) {
              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: prs[0].number,
                title,
                body,
              });
              core.info(`Updated PR #${prs[0].number}`);
            } else {
              const { data: pr } = await github.rest.pulls.create({
                owner,
                repo,
                title,
                body,
                head: branch,
                base: 'main',
                maintainer_can_modify: true,
              });
              core.info(`Created PR #${pr.number}`);
            }

      - name: Create or update conflict issue
        if: steps.sync.outputs.has_changes == 'true' && steps.sync.outputs.merge_conflict == 'true'
        uses: actions/github-script@v7
        env:
          UPSTREAM_REPOSITORY: ${{ steps.sync.outputs.upstream_repository }}
          UPSTREAM_BRANCH: ${{ steps.sync.outputs.upstream_branch }}
          BASE_HEAD: ${{ steps.sync.outputs.base_head }}
          UPSTREAM_HEAD: ${{ steps.sync.outputs.upstream_head }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const marker = '<!-- cuda-oxide-upstream-sync-candidate-conflict -->';
            const { owner, repo } = context.repo;
            const title = `Upstream sync blocked: ${process.env.UPSTREAM_REPOSITORY}/${process.env.UPSTREAM_BRANCH} ${process.env.UPSTREAM_HEAD.slice(0, 7)}`;
            const body = [
              marker,
              '## Upstream sync blocked',
              '',
              `- Upstream: ${process.env.UPSTREAM_REPOSITORY}/${process.env.UPSTREAM_BRANCH}`,
              `- Base HEAD: \`${process.env.BASE_HEAD}\``,
              `- Upstream HEAD: \`${process.env.UPSTREAM_HEAD}\``,
              `- Workflow run: ${process.env.RUN_URL}`,
              '',
              'The automated candidate merge hit conflicts. Resolve locally with:',
              '',
              '```powershell',
              'git fetch upstream --tags',
              'git checkout main',
              'git merge --no-ff upstream/main',
              '# Resolve conflicts, then:',
              'git add <resolved files>',
              'git commit',
              '.\\scripts\\sync-upstream.ps1 -RunChecks -Push',
              '```',
              '',
              'Do not publish a new Windows release unless upstream has published a matching upstream release tag.',
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });
            const existing = issues.find((issue) =>
              !issue.pull_request &&
              issue.title.startsWith('Upstream sync blocked:') &&
              issue.body &&
              issue.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                title,
                body,
              });
              core.info(`Updated issue #${existing.number}`);
            } else {
              const { data: issue } = await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
              });
              core.info(`Created issue #${issue.number}`);
            }
